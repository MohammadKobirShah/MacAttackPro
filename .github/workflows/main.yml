name: MacAttack Pro Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags (e.g., v4.8.0)
  workflow_dispatch: # Allow manual triggering

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Build Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller requests semver PyQt5 python-vlc

    - name: Compile Windows EXE with PyInstaller
      run: |
        pyinstaller --onefile --add-data "include;include" --add-binary "libvlc.dll;." --add-binary "libvlccore.dll;." --add-data "plugins;plugins" --hidden-import=charset_normalizer.md__mypyc --icon=icon.ico MacAttack.pyw

    - name: Prepare Release Assets
      run: |
        mkdir release_assets
        copy dist\MacAttack.exe release_assets\MacAttack.exe
        copy macattack.sh release_assets\macattack.sh

    - name: Upload Artifacts (for workflow runs)
      uses: actions/upload-artifact@v4
      with:
        name: MacAttack-Assets
        path: release_assets/
        retention-days: 90

    - name: Create GitHub Release & Upload Assets
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          release_assets/MacAttack.exe
          release_assets/macattack.sh
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
